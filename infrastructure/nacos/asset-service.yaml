spring:
  application:
    name: asset-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/homecare?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:HomeCare2026@DB}

server:
  port: 8084

dubbo:
  protocol:
    port: 20884

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

# MinIO 配置（覆盖共享配置）
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9001}
  access-key: ${MINIO_ROOT_USER:homecareadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:HomeCare2026@Minio}
