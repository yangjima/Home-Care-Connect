# ============================================================
# Nacos 共享配置 - 所有服务共享的基础配置
# ============================================================

spring:
  application:
    name: homecare-shared

  # 数据源配置（各服务可覆盖）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: HomecareHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis 配置（各服务可覆盖）
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:HomeCare2026@Redis}
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MinIO 对象存储配置（资产服务使用）
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9001}
  access-key: ${MINIO_ROOT_USER:homecareadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:HomeCare2026@Minio}
  bucket:
    property: homecare-property
    product: homecare-product
    secondhand: homecare-secondhand
    avatar: homecare-avatar

# JWT 配置
jwt:
  secret: ${JWT_SECRET:HomeCareJWT2026SecretKeyVeryLongAndSecureDoNotShare}
  # Access Token 有效期（秒）
  access-expire: 7200
  # Refresh Token 有效期（秒）
  refresh-expire: 604800

# 日志配置
logging:
  level:
    root: INFO
    com.homecare: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
