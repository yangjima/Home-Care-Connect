# ============================================================
# Spring Boot 应用配置
# ============================================================

spring:
  application:
    name: user-service

  # 本机可选配置：application-local.yml（已 gitignore，存在则自动合并） 通过这种方式来避免将敏感信息暴露在仓库中
  config:
    import: optional:classpath:application-local.yml

  # 数据源配置（由 Nacos shared.yaml 提供默认值）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置（由 Nacos shared.yaml 提供默认值）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:HomeCare2026@Redis}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Cloud Nacos Config
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_HOST:localhost}:8848
        file-extension: yaml
        shared-configs:
          - data-id: shared.yaml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        server-addr: ${NACOS_HOST:localhost}:8848

# 登录密码 RSA 解密：PKCS#8 PEM，须与前端 VITE_LOGIN_RSA_PUBLIC_KEY 为同一对密钥。
# 推荐在 application-local.yml（已 gitignore）中配置，或通过环境变量 LOGIN_RSA_PRIVATE_KEY（多行 PEM 可用 \n）
app:
  security:
    login-rsa:
      private-key: ${LOGIN_RSA_PRIVATE_KEY:}
  user-stats:
    # 「在线」人数：最近多少分钟内有登录记录
    online-within-minutes: ${USER_STATS_ONLINE_WITHIN_MINUTES:15}

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.homecare.user.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 服务端口
server:
  port: 8081

# 日志配置
logging:
  level:
    com.homecare.user: DEBUG
    com.homecare.common: DEBUG

jwt:
  # access token 默认 1 天，配合前端活跃续期策略
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
  # refresh token 默认 7 天，可按需通过环境变量覆盖
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}



# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    discovery-client:
      enabled: true
