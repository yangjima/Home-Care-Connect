# ============================================================
# Spring Boot 应用配置
# ============================================================

spring:
  application:
    name: user-service

  # 数据源配置（由 Nacos shared.yaml 提供默认值）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置（由 Nacos shared.yaml 提供默认值）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:HomeCare2026@Redis}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Cloud Nacos Config
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_HOST:localhost}:8848
        file-extension: yaml
        shared-configs:
          - data-id: shared.yaml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        server-addr: ${NACOS_HOST:localhost}:8848

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.homecare.user.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 服务端口
server:
  port: 8081

# 日志配置
logging:
  level:
    com.homecare.user: DEBUG
    com.homecare.common: DEBUG

jwt:
  # access token 默认 1 天，配合前端活跃续期策略
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
  # refresh token 默认 7 天，可按需通过环境变量覆盖
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# 邮件验证码发送配置（预留：你可以在 Nacos/shared.yaml 或环境变量里覆盖）
app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:}
    ssl: ${MAIL_SSL:true}
  security:
    login-rsa:
      # PKCS#8 PEM private key, used to decrypt login password ciphertext (optional)
      private-key: ${LOGIN_RSA_PRIVATE_KEY:}

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    discovery-client:
      enabled: true
