# ============================================================
# Spring Boot 应用配置
# ============================================================

spring:
  application:
    name: property-service

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:HomeCare2026@Redis}
      timeout: 5000ms

  cloud:
    nacos:
      config:
        server-addr: ${NACOS_HOST:localhost}:8848
        file-extension: yaml
        shared-configs:
          - data-id: shared.yaml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        server-addr: ${NACOS_HOST:localhost}:8848

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.homecare.property.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8082

logging:
  level:
    com.homecare.property: DEBUG
    com.homecare.common: DEBUG

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    discovery-client:
      enabled: true
