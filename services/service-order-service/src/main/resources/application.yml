spring:
  application:
    name: service-order-service
  config:
    import: optional:nacos:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}/service-order-service.yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:homecare}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 5000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

server:
  port: 8082

nacos:
  discovery:
    server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
    namespace: ${NACOS_NAMESPACE:public}
  config:
    server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
    namespace: ${NACOS_NAMESPACE:public}
    file-extension: yaml
    refresh-enabled: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

logging:
  level:
    com.homecare.serviceorder: DEBUG

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    discovery-client:
      enabled: true
