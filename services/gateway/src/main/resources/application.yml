spring:
  application:
    name: gateway
  config:
    import: optional:nacos:gateway.yaml
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2
        - id: property-service
          uri: lb://property-service
          predicates:
            - Path=/api/property/**
          filters:
            - StripPrefix=2
        - id: service-order-service
          uri: lb://service-order-service
          predicates:
            - Path=/api/service/**
          filters:
            - StripPrefix=2
        - id: asset-service
          uri: lb://asset-service
          predicates:
            - Path=/api/asset/**
          filters:
            - StripPrefix=2
        - id: ai-service
          uri: http://ai-service:8000
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=0

      # Actuator 健康检查路由（不走 StripPrefix）
      discovery-client:
        enabled: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    discovery-client:
      enabled: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            maxAge: 3600

server:
  port: 8080

nacos:
  discovery:
    server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
    namespace: ${NACOS_NAMESPACE:public}
  config:
    server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
    namespace: ${NACOS_NAMESPACE:public}
    file-extension: yaml
    refresh-enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
